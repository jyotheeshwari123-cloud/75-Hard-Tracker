<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>75 Hard</title>

  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<div class="container">
  <h1>75 Hard</h1>
  <h2 id="day">Day 1</h2>
  <h3 id="streak">🔥 Streak: 0 days</h3>

    <div class="tasks">
    <label><input type="checkbox"> Wake up by 4:30 AM</label>
    <label><input type="checkbox"> Breathing exercises</label>
    <label><input type="checkbox"> Full body workout (~45 min)</label>
    <label><input type="checkbox"> Progress picture</label>
    <label><input type="checkbox"> Read Bhagavad Gita</label>
    <label><input type="checkbox"> Eat (11 AM – 7 PM)</label>
    <label><input type="checkbox"> Jog (~45 min)</label>
    <label><input type="checkbox"> Drink atleast 3L water</label>
    <label><input type="checkbox"> Sleep by 9:30 PM</label>
    </div>


<!-- ⚖️ WEIGHT TRANSFORMATION -->
<div class="weight-section">

  <h3>⚖️ Weight Transformation</h3>

  <p class="weight-goal">
    Current: <strong>54 kg</strong>
    → Goal: <strong>45 kg</strong>
  </p>

  <div class="weight-input-area">
    <input
      type="number"
      id="weightInput"
      placeholder="Enter current weight"
    />

    <button onclick="saveWeight()">
      Update Weight
    </button>
  </div>

  <canvas id="weightChart"></canvas>

</div>

  <!-- 🎁 REWARD SECTION -->
  <div class="reward-section">
    <h3>🎁 Motivation Reward</h3>

    <p id="rewardText"></p>
  </div>

  
  <button id="nextDay">Complete Day 💪</button>

  <div class="progress">
    <div id="progressBar"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
